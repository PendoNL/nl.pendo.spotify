<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
      }

      body.homey-widget {
        display: flex;
        flex-direction: column;
        gap: var(--homey-su-2);
        height: 100%;
        overflow: hidden;
      }

      .search-container {
        position: relative;
      }

      .search-input {
        width: 100%;
        padding: var(--homey-su-2);
        padding-left: var(--homey-su-6);
        border: 1px solid var(--homey-color-mono-300);
        border-radius: var(--homey-border-radius);
        font-size: var(--homey-font-size-default);
        background-color: var(--homey-color-mono-100);
        color: var(--homey-text-color);
        outline: none;
      }

      .search-input:focus {
        border-color: var(--homey-color-primary-500);
      }

      .search-input::placeholder {
        color: var(--homey-color-mono-500);
      }

      .search-icon {
        position: absolute;
        left: var(--homey-su-2);
        top: 50%;
        transform: translateY(-50%);
        color: var(--homey-color-mono-500);
        pointer-events: none;
      }

      .results {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: var(--homey-su-1);
      }

      .song-item {
        display: flex;
        align-items: center;
        gap: var(--homey-su-2);
        padding: var(--homey-su-2);
        background-color: var(--homey-color-mono-100);
        border-radius: var(--homey-border-radius);
        cursor: pointer;
        transition: background-color 0.15s ease;
      }

      .song-item:hover {
        background-color: var(--homey-color-mono-200);
      }

      .song-item:active {
        background-color: var(--homey-color-mono-300);
      }

      .song-image {
        width: 40px;
        height: 40px;
        border-radius: 4px;
        object-fit: cover;
        background-color: var(--homey-color-mono-200);
      }

      .song-info {
        flex: 1;
        min-width: 0;
        overflow: hidden;
      }

      .song-name {
        font-size: var(--homey-font-size-default);
        font-weight: 500;
        color: var(--homey-text-color);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .song-artist {
        font-size: var(--homey-font-size-small);
        color: var(--homey-color-mono-600);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .type-badge {
        font-size: 9px;
        padding: 2px 6px;
        border-radius: 3px;
        text-transform: uppercase;
        font-weight: 600;
        flex-shrink: 0;
      }

      .type-track { background: #1DB954; color: white; }
      .type-artist { background: #9B59B6; color: white; }
      .type-album { background: #3498DB; color: white; }
      .type-playlist { background: #E67E22; color: white; }

      .message {
        text-align: center;
        padding: var(--homey-su-4);
        color: var(--homey-color-mono-500);
        font-size: var(--homey-font-size-small);
      }

      .playing {
        background-color: var(--homey-color-primary-100);
      }

      .type-filters {
        display: flex;
        gap: var(--homey-su-1);
      }

      .type-filter {
        flex: 1;
        padding: var(--homey-su-1) var(--homey-su-2);
        border: 1px solid var(--homey-color-mono-300);
        border-radius: var(--homey-border-radius);
        background-color: var(--homey-color-mono-100);
        color: var(--homey-text-color);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        cursor: pointer;
        text-align: center;
        transition: background-color 0.15s ease, border-color 0.15s ease;
      }

      .type-filter:hover {
        background-color: var(--homey-color-mono-200);
      }

      .type-filter.active {
        border-color: transparent;
        color: white;
      }

      .type-filter[data-type="all"].active { background-color: #555; }
      .type-filter[data-type="track"].active { background-color: #1DB954; }
      .type-filter[data-type="artist"].active { background-color: #9B59B6; }
      .type-filter[data-type="album"].active { background-color: #3498DB; }
      .type-filter[data-type="playlist"].active { background-color: #E67E22; }

      .load-more {
        padding: var(--homey-su-2);
        border: 1px solid var(--homey-color-mono-300);
        border-radius: var(--homey-border-radius);
        background-color: var(--homey-color-mono-100);
        color: var(--homey-text-color);
        font-size: var(--homey-font-size-small);
        cursor: pointer;
        text-align: center;
        transition: background-color 0.15s ease;
      }

      .load-more:hover {
        background-color: var(--homey-color-mono-200);
      }

      .load-more:disabled {
        opacity: 0.5;
        cursor: default;
      }
    </style>
  </head>

  <body class="homey-widget">
    <div class="search-container">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="Search songs, artists, albums..."
        autocomplete="off"
      >
    </div>

    <div class="type-filters" id="typeFilters">
      <button class="type-filter active" data-type="all">All</button>
      <button class="type-filter" data-type="track">Tracks</button>
      <button class="type-filter" data-type="artist">Artists</button>
      <button class="type-filter" data-type="album">Albums</button>
      <button class="type-filter" data-type="playlist">Playlists</button>
    </div>

    <div class="results" id="results">
      <div class="message" id="message">Type to search Spotify</div>
    </div>

    <script type="text/javascript">
      let searchTimeout;
      let deviceId = null;
      let currentOffset = 0;
      let currentQuery = '';
      let currentType = 'all';
      let isLoading = false;

      function onHomeyReady(Homey) {
        Homey.ready();

        const deviceIds = Homey.getDeviceIds();
        deviceId = deviceIds && deviceIds.length > 0 ? deviceIds[0] : null;

        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');
        const messageDiv = document.getElementById('message');

        if (!deviceId) {
          messageDiv.textContent = 'Please select a device in widget settings';
          searchInput.disabled = true;
          return;
        }

        function createResultItem(item) {
          const div = document.createElement('div');
          div.className = 'song-item';

          const img = document.createElement('img');
          img.className = 'song-image';
          img.src = item.image || '';
          img.alt = '';
          img.onerror = () => { img.style.display = 'none'; };

          const info = document.createElement('div');
          info.className = 'song-info';

          const name = document.createElement('div');
          name.className = 'song-name';
          name.textContent = item.name;

          const subtitle = document.createElement('div');
          subtitle.className = 'song-artist';
          subtitle.textContent = item.subtitle;

          info.appendChild(name);
          info.appendChild(subtitle);

          const badge = document.createElement('span');
          badge.className = 'type-badge type-' + item.type;
          badge.textContent = item.type;

          div.appendChild(img);
          div.appendChild(info);
          div.appendChild(badge);

          div.addEventListener('click', () => {
            div.classList.add('playing');
            Homey.api('POST', '/play', { deviceId, uri: item.uri, type: item.type })
              .then(() => {
                setTimeout(() => div.classList.remove('playing'), 1000);
              })
              .catch((err) => {
                div.classList.remove('playing');
                console.error('Play error:', err);
              });
          });

          return div;
        }

        function removeLoadMoreButton() {
          const existing = resultsDiv.querySelector('.load-more');
          if (existing) existing.remove();
        }

        function getTypeParam() {
          return currentType === 'all' ? 'track,artist,album,playlist' : currentType;
        }

        function doSearch(query, offset, append) {
          if (isLoading) return;
          isLoading = true;

          if (!append) {
            resultsDiv.innerHTML = '<div class="message">Searching...</div>';
          } else {
            const btn = resultsDiv.querySelector('.load-more');
            if (btn) {
              btn.disabled = true;
              btn.textContent = 'Loading...';
            }
          }

          Homey.api('POST', '/search', { query, deviceId, offset, type: getTypeParam() })
            .then((response) => {
              const items = response.items || [];
              const hasMore = response.hasMore || false;

              if (!append) {
                resultsDiv.innerHTML = '';
              } else {
                removeLoadMoreButton();
              }

              if (items.length === 0 && !append) {
                resultsDiv.innerHTML = '<div class="message">No results found</div>';
                return;
              }

              items.forEach(item => {
                resultsDiv.appendChild(createResultItem(item));
              });

              currentOffset = offset + 10;

              if (hasMore) {
                const btn = document.createElement('button');
                btn.className = 'load-more';
                btn.textContent = 'Load more';
                btn.addEventListener('click', () => {
                  doSearch(currentQuery, currentOffset, true);
                });
                resultsDiv.appendChild(btn);
              }
            })
            .catch((err) => {
              console.error('Search error:', err);
              if (!append) {
                resultsDiv.innerHTML = '<div class="message">Search failed</div>';
              } else {
                removeLoadMoreButton();
              }
            })
            .finally(() => {
              isLoading = false;
            });
        }

        searchInput.addEventListener('input', (event) => {
          clearTimeout(searchTimeout);
          const query = event.target.value.trim();

          if (query.length < 2) {
            currentQuery = '';
            currentOffset = 0;
            resultsDiv.innerHTML = '<div class="message">Type to search Spotify</div>';
            return;
          }

          searchTimeout = setTimeout(() => {
            currentQuery = query;
            currentOffset = 0;
            doSearch(query, 0, false);
          }, 300);
        });

        document.querySelectorAll('.type-filter').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('.type-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentType = btn.dataset.type;
            currentOffset = 0;
            if (currentQuery.length >= 2) {
              doSearch(currentQuery, 0, false);
            }
          });
        });
      }
    </script>
  </body>
</html>
